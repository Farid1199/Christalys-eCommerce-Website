<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chrystalis - Contact Us</title>
    <link rel="icon" href="img/favicon.png" type="image/x-icon" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css?family=Roboto:400,700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" type="text/css" href="css/style.css" />
  </head>

  <body>
    <!-- Header Section -->
    <header>
      <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
          <div id="logo" style="padding-bottom: 10px">
            <img
              src="img/logo.png"
              alt="TopLeft Logo"
              style="padding-left: 50px; width: 35%; height: 35%"
            />
          </div>

          <form class="d-flex flex-grow-1 mx-auto" role="search">
            <input
              class="form-control me-2"
              type="search"
              placeholder="Search"
              aria-label="Search"
            />
            <button class="btn btn-outline-success" type="submit">
              Search
            </button>
          </form>

          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul id="top-nav" class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="#">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Products</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Cart</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">About Us</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Log In</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <!-- Main Section -->
    <main>
      <h1 class="my-4 text-center">Contact Chrystalis!</h1>
      <!-- Contact Form Section -->
      <section class="Contact-us">
        <form id="contactForm" onsubmit="return checkForm()" name="contactForm">
          <!-- Form Fields -->
          <label for="name">Name:</label>
          <input type="text" id="name" name="name" required="" />

          <label for="email">Email:</label>
          <input type="email" id="email" name="email" required="" />

          <label for="confirm-email">Confirm Email:</label>
          <input
            type="email"
            id="confirm-email"
            name="confirm-email"
            required=""
          />
          <label for="phone">Phone Number:</label>
          <input type="tel" id="phone" name="phone" required="" />

          <label for="message">Message:</label>
          <textarea id="message" name="message" required=""></textarea>

          <!-- Submit Button -->
          <input
            class="btn-primary"
            type="submit"
            name="submit"
            value="Submit"
          />
        </form>
      </section>
    </main>

    <!-- Footer Section -->
    <footer>
      <section id="conclusion">
        <div class="copyright-bottom">
          <marquee>Copyright © 2023 Chrystalis. All rights reserved</marquee>
        </div>
      </section>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
